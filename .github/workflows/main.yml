name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi[all] sqlalchemy pydantic email-validator python-jose[cryptography] passlib[bcrypt] bcrypt python-multipart
      - name: Check code
        run: |
          python -m compileall .

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: '20.x' }
      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Setup Backend & Start
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install fastapi[all] sqlalchemy pydantic email-validator python-jose[cryptography] passlib[bcrypt] bcrypt python-multipart
          python seed_admin.py
          uvicorn main:app --port 8000 &

      - name: Setup Frontend & Start
        working-directory: ./frontend
        run: |
          npm ci || npm install
          npm run dev &

      - name: Wait for servers
        run: sleep 5

      - name: Setup Playwright & Run Tests
        working-directory: ./e2e
        run: |
          npm ci || npm install
          npx playwright install --with-deps
          npx playwright test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30
